<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anki 單字卡</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --muted: #94a3b8;
      --text: #f8fafc;
      --accent: #38bdf8;
      --accent-2: #22c55e;
      --danger: #fb7185;
      --border: #334155;
      --shadow: 0 20px 40px rgba(0,0,0,.25);
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans TC", "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #020617 0%, #0f172a 100%);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap { max-width: 1240px; margin: 0 auto; padding: 24px; }
    .hero { display: grid; gap: 14px; margin-bottom: 24px; }
    h1 { margin: 0; font-size: clamp(28px, 4vw, 44px); line-height: 1.1; }
    .sub { color: var(--muted); line-height: 1.7; max-width: 920px; }
    .grid { display: grid; grid-template-columns: 380px 1fr; gap: 20px; }
    @media (max-width: 960px) { .grid { grid-template-columns: 1fr; } }
    .panel {
      background: rgba(17,24,39,.92);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      backdrop-filter: blur(8px);
    }
    .panel h2 { margin: 0 0 12px; font-size: 20px; }
    .help { font-size: 14px; color: var(--muted); line-height: 1.7; }
    textarea, input, select {
      width: 100%;
      background: #0b1220;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 14px;
      font: inherit;
    }
    textarea { min-height: 220px; resize: vertical; line-height: 1.6; }
    .row { display: grid; gap: 10px; margin-top: 12px; }
    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btns, .controls, .review-stats { display: flex; flex-wrap: wrap; gap: 10px; }
    button, .file-label {
      appearance: none;
      border: 1px solid var(--border);
      background: #1e293b;
      color: var(--text);
      padding: 11px 14px;
      border-radius: 14px;
      cursor: pointer;
      font: inherit;
      transition: .18s transform ease, .18s opacity ease, .18s background ease;
    }
    button:hover, .file-label:hover { transform: translateY(-1px); }
    button.primary { background: var(--accent); color: #062033; font-weight: 700; }
    button.good { background: var(--accent-2); color: #052e16; font-weight: 700; }
    button.danger { background: var(--danger); color: #3a0413; font-weight: 700; }
    button:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    input[type="file"] { display: none; }
    .status { margin-top: 10px; min-height: 24px; font-size: 14px; color: var(--muted); }
    .dashboard {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    @media (max-width: 700px) {
      .dashboard { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .row-2 { grid-template-columns: 1fr; }
      .review-actions { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    .stat { background: #0b1220; border: 1px solid var(--border); border-radius: 16px; padding: 14px; }
    .stat .label { color: var(--muted); font-size: 13px; margin-bottom: 6px; }
    .stat .value { font-size: 24px; font-weight: 800; }
    .viewer { display: grid; gap: 14px; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: space-between; }
    .search { flex: 1 1 220px; }
    .progress-panel { display: grid; gap: 10px; }
    .progress-text { font-size: 14px; color: var(--muted); }
    .progress-bar {
      width: 100%; height: 12px; border-radius: 999px; background: #0b1220;
      border: 1px solid var(--border); overflow: hidden;
    }
    .progress-fill { height: 100%; width: 0%; background: var(--accent); transition: width .25s ease; }
    .flashcard-wrap { perspective: 1200px; }
    .flashcard {
      position: relative;
      min-height: 420px;
      width: 100%;
      transform-style: preserve-3d;
      transition: transform .6s ease;
      cursor: pointer;
    }
    .flashcard.flipped { transform: rotateY(180deg); }
    .face {
      position: absolute;
      inset: 0;
      border-radius: 24px;
      border: 1px solid var(--border);
      background: linear-gradient(160deg, rgba(56,189,248,.12), rgba(17,24,39,.96));
      box-shadow: var(--shadow);
      padding: 28px;
      backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
    }
    .back {
      transform: rotateY(180deg);
      background: linear-gradient(160deg, rgba(34,197,94,.12), rgba(17,24,39,.96));
    }
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 10px;
      margin-bottom: 14px;
      background: rgba(15,23,42,.65);
    }
    .audio-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; min-height: 22px; }
    .tts-btn { padding: 7px 10px; border-radius: 999px; font-size: 12px; background: rgba(56,189,248,.12); }
    .front-text { font-size: clamp(26px, 4vw, 40px); font-weight: 800; line-height: 1.3; width: 100%; }
    .back-text { font-size: clamp(16px, 2vw, 20px); line-height: 1.8; overflow-y: auto; width: 100%; max-height: 320px; }
    .card-html { white-space: normal; line-height: 1.8; width: 100%; }
    .card-html .line { margin-bottom: 8px; }
    .card-html .line:last-child { margin-bottom: 0; }
    .review-actions { display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)); gap: 10px; }
    .review-btn { font-weight: 700; padding: 12px 10px; }
    .again { background: #7f1d1d; color: #fff; }
    .hard { background: #78350f; color: #fff; }
    .good-score { background: #14532d; color: #fff; }
    .easy { background: #0f766e; color: #fff; }
    .flagged { background: #1d4ed8; color: #fff; }
    .completion-screen {
      display: grid; gap: 12px; padding: 24px; border: 1px solid var(--border);
      border-radius: 20px; background: #0b1220; text-align: center;
    }
    .completion-title { font-size: 30px; font-weight: 800; }
    .completion-summary { color: var(--muted); line-height: 1.7; }
    .list { margin-top: 8px; display: grid; gap: 10px; max-height: 280px; overflow: auto; padding-right: 4px; }
    .item { border: 1px solid var(--border); background: #0b1220; border-radius: 14px; padding: 12px; }
    .item.active { outline: 2px solid var(--accent); }
    .item-front { font-weight: 700; }
    .item-back {
      color: var(--muted); font-size: 13px; margin-top: 6px; display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; white-space: pre-wrap;
    }
    code { word-break: break-all; }
    kbd {
      background: #0b1220; border: 1px solid var(--border); border-bottom-width: 3px;
      border-radius: 8px; padding: 2px 6px; font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>Anki 單字卡</h1>
      <h2><a href="https://drive.google.com/file/d/1jguDNpL_wepSjzJD8V6ekKVKJOaobbI_/view?usp=sharing">高中單字詞彙表下載</a></h2>
      <div class="sub">
      </div>
    </section>

    <div class="grid">
      <aside class="panel">
        <h2>匯入資料</h2>
        <div class="help">
          支援 <strong>Tab 分隔</strong>、<strong>CSV</strong>、<strong>JSON</strong>。<br>
        快捷鍵：<kbd>←</kbd> 上一張、<kbd>→</kbd> 下一張、<kbd>空白</kbd> 翻面、<kbd>1</kbd> Again、<kbd>2</kbd> Hard、<kbd>3</kbd> Good、<kbd>4</kbd> Easy、<kbd>5</kbd> 收藏。
        </div>

        <div class="row">
          <label for="inputArea">貼上卡片資料</label>
          <textarea id="inputArea" placeholder="ability (n.)	{{tts en_US:ability}}&lt;br&gt;【解釋】能力...	Lv1"></textarea>
        </div>

        <div class="row row-2">
          <div>
            <label for="formatSelect">匯入格式</label>
            <select id="formatSelect">
              <option value="tsv">Tab 分隔（推薦）</option>
              <option value="csv">CSV</option>
              <option value="json">JSON</option>
            </select>
          </div>
          <div>
            <label for="deckName">牌組名稱</label>
            <input id="deckName" value="單字複習牌組" />
          </div>
        </div>

        <div class="btns">
          <button class="primary" id="importBtn">匯入卡片</button>
          <button id="saveBtn">存到瀏覽器</button>
          <label class="file-label" for="fileInput">讀取檔案</label>
          <input id="fileInput" type="file" accept=".txt,.tsv,.csv,.json" />
          <button class="danger" id="clearBtn">清空資料</button>
        </div>

        <div class="status" id="status">尚未匯入資料。</div>
      </aside>

      <main class="panel viewer">
        <div class="dashboard">
          <div class="stat"><div class="label">牌組名稱</div><div class="value" id="deckNameStat">未命名</div></div>
          <div class="stat"><div class="label">卡片總數</div><div class="value" id="countStat">0</div></div>
          <div class="stat"><div class="label">剩餘卡片</div><div class="value" id="resultStat">0</div></div>
          <div class="stat"><div class="label">當前進度</div><div class="value" id="indexStat">0 / 0</div></div>
          <div class="stat"><div class="label">不熟字卡</div><div class="value" id="flaggedStat">0</div></div>
        </div>

        <div class="toolbar">
          <input class="search" id="searchInput" placeholder="搜尋單字或內容，例如 ability / 搭配詞 / 中文翻譯" />
          <div class="controls">
            <button id="prevBtn">上一張</button>
            <button class="good" id="flipBtn">翻面</button>
            <button id="nextBtn">下一張</button>
            <button id="shuffleBtn">洗牌</button>
            <button id="restartBtn">重新開始</button>
            <button id="studyFlaggedBtn">複習不熟字卡</button>
          </div>
        </div>

        <div class="progress-panel">
          <div class="progress-text" id="progressText">剩下卡片數量：0 / 0</div>
          <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
          <div class="review-stats">
            <span>Again: <strong id="againCount">0</strong></span>
            <span>Hard: <strong id="hardCount">0</strong></span>
            <span>Good: <strong id="goodCount">0</strong></span>
            <span>Easy: <strong id="easyCount">0</strong></span>
          </div>
        </div>

        <div class="flashcard-wrap">
          <div class="flashcard" id="flashcard">
            <section class="face front">
              <div class="tag">正面 / Front</div>
              <div class="audio-bar" id="frontAudioBar"></div>
              <div class="front-text" id="frontText">尚未載入卡片</div>
            </section>
            <section class="face back">
              <div class="tag">背面 / Back</div>
              <div class="audio-bar" id="backAudioBar"></div>
              <div class="back-text" id="backText">匯入資料後，這裡會顯示解釋、搭配詞、例句和翻譯。</div>
            </section>
          </div>
        </div>

        <div class="review-actions" id="reviewActions">
          <button class="review-btn again" id="againBtn">Again</button>
          <button class="review-btn hard" id="hardBtn">Hard</button>
          <button class="review-btn good-score" id="goodBtn">Good</button>
          <button class="review-btn easy" id="easyBtn">Easy</button>
          <button class="review-btn flagged" id="flagBtn">收藏不熟</button>
          <button class="review-btn" id="unflagBtn">取消不熟字</button>
        </div>

        <div class="completion-screen" id="completionScreen" hidden>
          <div class="completion-title">完成練習！</div>
          <div class="completion-summary" id="completionSummary">你已完成本次卡片複習。</div>
          <button class="primary" id="restartSessionBtn">重新開始</button>
        </div>

        <div class="list" id="cardList"></div>
      </main>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'anki_vocab_import_webapp_final_import_fixed_cards';
    const FLAGGED_STORAGE_KEY = 'anki_vocab_import_webapp_final_import_fixed_flagged';

    const state = {
      deckName: '未命名',
      cards: [],
      filtered: [],
      reviewQueue: [],
      flagged: [],
      initialReviewCount: 0,
      stats: { again: 0, hard: 0, good: 0, easy: 0 },
      flipped: false,
      voices: [],
    };

    const els = {
      inputArea: document.getElementById('inputArea'),
      formatSelect: document.getElementById('formatSelect'),
      deckName: document.getElementById('deckName'),
      importBtn: document.getElementById('importBtn'),
      saveBtn: document.getElementById('saveBtn'),
      clearBtn: document.getElementById('clearBtn'),
      fileInput: document.getElementById('fileInput'),
      status: document.getElementById('status'),
      deckNameStat: document.getElementById('deckNameStat'),
      countStat: document.getElementById('countStat'),
      resultStat: document.getElementById('resultStat'),
      indexStat: document.getElementById('indexStat'),
      flaggedStat: document.getElementById('flaggedStat'),
      progressText: document.getElementById('progressText'),
      progressFill: document.getElementById('progressFill'),
      againCount: document.getElementById('againCount'),
      hardCount: document.getElementById('hardCount'),
      goodCount: document.getElementById('goodCount'),
      easyCount: document.getElementById('easyCount'),
      searchInput: document.getElementById('searchInput'),
      flashcard: document.getElementById('flashcard'),
      frontText: document.getElementById('frontText'),
      backText: document.getElementById('backText'),
      frontAudioBar: document.getElementById('frontAudioBar'),
      backAudioBar: document.getElementById('backAudioBar'),
      prevBtn: document.getElementById('prevBtn'),
      flipBtn: document.getElementById('flipBtn'),
      nextBtn: document.getElementById('nextBtn'),
      shuffleBtn: document.getElementById('shuffleBtn'),
      restartBtn: document.getElementById('restartBtn'),
      studyFlaggedBtn: document.getElementById('studyFlaggedBtn'),
      againBtn: document.getElementById('againBtn'),
      hardBtn: document.getElementById('hardBtn'),
      goodBtn: document.getElementById('goodBtn'),
      easyBtn: document.getElementById('easyBtn'),
      flagBtn: document.getElementById('flagBtn'),
      unflagBtn: document.getElementById('unflagBtn'),
      reviewActions: document.getElementById('reviewActions'),
      completionScreen: document.getElementById('completionScreen'),
      completionSummary: document.getElementById('completionSummary'),
      restartSessionBtn: document.getElementById('restartSessionBtn'),
      cardList: document.getElementById('cardList'),
    };

    function setStatus(message, good = true) {
      els.status.textContent = message;
      els.status.style.color = good ? 'var(--muted)' : 'var(--danger)';
    }

    function normalizeBackText(text) {
      return String(text || '').replace(/<br\s*\/?\>/gi, '\n').replace(/\r\n/g, '\n').trim();
    }

    function htmlToDisplay(text) {
      return String(text || '').replace(/<br\s*\/?\>/gi, '\n').replace(/&nbsp;/g, ' ').trim();
    }

    function parseTSV(text) {
      const lines = text.split(/\r?\n/).filter(line => line.trim());
      const cards = [];
      for (const line of lines) {
        const parts = line.split('\t');
        if (parts.length < 2) continue;
        const front = (parts[0] || '').trim();
        const back = (parts[1] || '').trim();
        const level = (parts[2] || '').trim() || '未分類';
        if (front && back) cards.push({ front, back: normalizeBackText(back), level });
      }
      return cards;
    }

    function parseCSV(text) {
      const rows = [];
      let current = '';
      let row = [];
      let inQuotes = false;
      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];
        if (char === '"') {
          if (inQuotes && next === '"') { current += '"'; i++; }
          else { inQuotes = !inQuotes; }
        } else if (char === ',' && !inQuotes) {
          row.push(current); current = '';
        } else if ((char === '\n' || char === '\r') && !inQuotes) {
          if (char === '\r' && next === '\n') i++;
          row.push(current);
          if (row.some(cell => cell.trim() !== '')) rows.push(row);
          row = []; current = '';
        } else current += char;
      }
      if (current.length || row.length) {
        row.push(current);
        if (row.some(cell => cell.trim() !== '')) rows.push(row);
      }

      let startIndex = 0;
      if (rows[0] && rows[0].length >= 2) {
        const first = rows[0][0].trim().toLowerCase();
        const second = rows[0][1].trim().toLowerCase();
        if ((first === 'front' || first === '學習卡正面' || first === '正面') && (second === 'back' || second === '學習卡背面' || second === '背面')) {
          startIndex = 1;
        }
      }

      return rows.slice(startIndex)
        .filter(r => r.length >= 2)
        .map(r => ({
          front: (r[0] || '').trim(),
          back: normalizeBackText(r[1] || ''),
          level: (r[2] || '').trim() || '未分類'
        }))
        .filter(card => card.front && card.back);
    }

    function parseJSON(text) {
      const data = JSON.parse(text);
      if (!Array.isArray(data)) throw new Error('JSON 必須是陣列格式');
      return data.map(item => ({
        front: String(item.front || item.question || item['學習卡正面'] || '').trim(),
        back: normalizeBackText(item.back || item.answer || item['學習卡背面'] || ''),
        level: String(item.level || item['等級'] || '未分類').trim() || '未分類',
      })).filter(card => card.front && card.back);
    }

    function parseInput(text, format) {
      if (!text.trim()) return [];
      if (format === 'tsv') return parseTSV(text);
      if (format === 'csv') return parseCSV(text);
      if (format === 'json') return parseJSON(text);
      return [];
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function extractTTS(text) {
      const raw = String(text || '');
      const tags = [];
      const cleaned = raw.replace(/\{\{tts\s+([a-zA-Z_\-]+)\s*:\s*([\s\S]*?)\}\}/g, function(_, voice, content) {
        const spoken = String(content || '').trim();
        if (spoken) tags.push({ voice: voice || 'en_US', text: spoken });
        return '';
      });
      return { cleaned: htmlToDisplay(cleaned), tags };
    }

    function formatCardHtml(text) {
      const lines = htmlToDisplay(text).split('\n');
      return '<div class="card-html">' + lines.map(function(line) {
        const content = line.trim() ? escapeHtml(line) : '&nbsp;';
        return '<div class="line">' + content + '</div>';
      }).join('') + '</div>';
    }

    function loadVoices() {
      if (!('speechSynthesis' in window)) return [];
      const voices = window.speechSynthesis.getVoices() || [];
      if (voices.length) state.voices = voices;
      return state.voices;
    }

    function resolveLang(voiceTag) {
      const tag = String(voiceTag || '').toLowerCase();
      if (tag.startsWith('en')) return 'en-US';
      if (tag.startsWith('zh')) return 'zh-TW';
      return 'en-US';
    }

    function getVoiceForLang(lang) {
      const voices = state.voices.length ? state.voices : loadVoices();
      const lower = String(lang).toLowerCase();
      return voices.find(v => String(v.lang || '').toLowerCase() === lower)
        || voices.find(v => String(v.lang || '').toLowerCase().startsWith(lower.split('-')[0]))
        || null;
    }

    function unlockSpeech() {
      if (!('speechSynthesis' in window)) return;
      try {
        const warmup = new SpeechSynthesisUtterance(' ');
        warmup.volume = 0;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(warmup);
      } catch (err) {
        console.error(err);
      }
    }

    function speakText(text, voiceTag = 'en_US') {
      if (!('speechSynthesis' in window)) {
        setStatus('這個瀏覽器不支援語音播放。', false);
        return;
      }
      loadVoices();
      const content = String(text || '').trim();
      if (!content) return;
      const utterance = new SpeechSynthesisUtterance(content);
      utterance.rate = 0.96;
      utterance.pitch = 1;
      utterance.volume = 1;
      utterance.lang = resolveLang(voiceTag);
      const matched = getVoiceForLang(utterance.lang);
      if (matched) utterance.voice = matched;
      window.speechSynthesis.cancel();
      setTimeout(() => window.speechSynthesis.speak(utterance), 60);
    }

    function renderAudioBar(target, tags) {
      target.innerHTML = '';
      if (!tags.length) return;
      tags.forEach((tag, idx) => {
        const btn = document.createElement('button');
        btn.className = 'tts-btn';
        btn.type = 'button';
        btn.textContent = '🔊 發音 ' + (idx + 1);
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          unlockSpeech();
          speakText(tag.text, tag.voice);
        });
        target.appendChild(btn);
      });
    }

    function sameCard(a, b) {
      return a && b && a.front === b.front && a.back === b.back;
    }

    function saveCardsToLocal() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ deckName: state.deckName, cards: state.cards }));
    }

    function saveFlaggedToLocal() {
      localStorage.setItem(FLAGGED_STORAGE_KEY, JSON.stringify(state.flagged));
    }

    function loadFlaggedFromLocal() {
      const raw = localStorage.getItem(FLAGGED_STORAGE_KEY);
      if (!raw) return;
      try {
        const data = JSON.parse(raw);
        if (Array.isArray(data)) state.flagged = data.filter(card => card && card.front && card.back);
      } catch (err) { console.error(err); }
    }

    function loadCardsFromLocal() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      try {
        const data = JSON.parse(raw);
        if (Array.isArray(data.cards)) {
          els.deckName.value = data.deckName || '未命名';
          importCards(data.cards, data.deckName || '未命名');
          setStatus('已從瀏覽器載入 ' + data.cards.length + ' 張卡片。');
        }
      } catch (err) { console.error(err); }
    }

    function rebuildReviewQueueFromFiltered() {
      state.reviewQueue = state.filtered.map(card => ({ front: card.front, back: card.back, level: card.level || '未分類' }));
      state.initialReviewCount = state.reviewQueue.length;
      state.stats = { again: 0, hard: 0, good: 0, easy: 0 };
      state.flipped = false;
    }

    function getCurrentCard() {
      return state.reviewQueue[0] || null;
    }

    function renderCard() {
      const card = getCurrentCard();
      if (!card) {
        els.frontText.textContent = '本次練習已完成';
        els.backText.textContent = '按下重新開始可再練一次。';
        els.frontAudioBar.innerHTML = '';
        els.backAudioBar.innerHTML = '';
        els.flashcard.classList.remove('flipped');
        els.indexStat.textContent = '0 / 0';
        return;
      }
      const frontData = extractTTS(card.front);
      const backData = extractTTS(card.back);
      els.frontText.innerHTML = formatCardHtml(frontData.cleaned);
      els.backText.innerHTML = formatCardHtml(backData.cleaned);
      renderAudioBar(els.frontAudioBar, frontData.tags);
      renderAudioBar(els.backAudioBar, backData.tags);
      els.flashcard.classList.toggle('flipped', state.flipped);
      const reviewed = state.initialReviewCount - state.reviewQueue.length + 1;
      els.indexStat.textContent = reviewed + ' / ' + state.initialReviewCount;
    }

    function renderList() {
      els.cardList.innerHTML = '';
      state.reviewQueue.slice(0, 30).forEach((card, i) => {
        const item = document.createElement('div');
        item.className = 'item' + (i === 0 ? ' active' : '');
        const frontData = extractTTS(card.front);
        const backData = extractTTS(card.back);
        item.innerHTML = '<div class="item-front">' + escapeHtml(frontData.cleaned) + '</div><div class="item-back">' + escapeHtml(backData.cleaned) + '</div>';
        els.cardList.appendChild(item);
      });
    }

    function renderStats() {
      const remaining = state.reviewQueue.length;
      const total = state.initialReviewCount || state.cards.length;
      const done = total - remaining;
      els.deckNameStat.textContent = state.deckName || '未命名';
      els.countStat.textContent = state.cards.length;
      els.resultStat.textContent = remaining;
      els.flaggedStat.textContent = state.flagged.length;
      els.progressText.textContent = '剩下卡片數量：' + remaining + ' / ' + total;
      els.progressFill.style.width = total ? ((done / total) * 100).toFixed(1) + '%' : '0%';
      els.againCount.textContent = state.stats.again;
      els.hardCount.textContent = state.stats.hard;
      els.goodCount.textContent = state.stats.good;
      els.easyCount.textContent = state.stats.easy;
      const disabled = remaining === 0;
      els.prevBtn.disabled = disabled;
      els.nextBtn.disabled = disabled;
      els.flipBtn.disabled = disabled;
      els.shuffleBtn.disabled = remaining < 2;
      els.againBtn.disabled = disabled;
      els.hardBtn.disabled = disabled;
      els.goodBtn.disabled = disabled;
      els.easyBtn.disabled = disabled;
      els.flagBtn.disabled = disabled;
      els.unflagBtn.disabled = disabled;
      els.studyFlaggedBtn.disabled = state.flagged.length === 0;
      els.reviewActions.hidden = disabled;
      els.completionScreen.hidden = !disabled;
      if (disabled) {
        els.completionSummary.textContent = '本次共完成 ' + total + ' 張卡片。Again: ' + state.stats.again + '，Hard: ' + state.stats.hard + '，Good: ' + state.stats.good + '，Easy: ' + state.stats.easy + '。';
      }
    }

    function renderAll() {
      renderStats();
      renderCard();
      renderList();
      }

    function restartReviewSession() {
      rebuildReviewQueueFromFiltered();
      renderAll();
      setStatus('已重新開始本次練習。');
    }

    function handleReview(action) {
      const current = state.reviewQueue.shift();
      if (!current) return;
      state.flipped = false;
      state.stats[action] += 1;
      if (action === 'again') {
        const pos = Math.min(1, state.reviewQueue.length);
        state.reviewQueue.splice(pos, 0, current);
      } else if (action === 'hard') {
        const pos = Math.floor(state.reviewQueue.length / 2);
        state.reviewQueue.splice(pos, 0, current);
      } else if (action === 'good') {
        state.reviewQueue.push(current);
      }
      renderAll();
    }

    function flagCurrentCard() {
      const card = getCurrentCard();
      if (!card) return;
      if (state.flagged.some(item => sameCard(item, card))) {
        setStatus('這張卡已經收藏在不熟字卡清單。');
        return;
      }
      state.flagged.push({ front: card.front, back: card.back, level: card.level || '未分類' });
      saveFlaggedToLocal();
      renderStats();
      setStatus('已收藏目前字卡，之後可再單獨複習。');
    }

    function unflagCurrentCard() {
      const card = getCurrentCard();
      if (!card) return;
      const before = state.flagged.length;
      state.flagged = state.flagged.filter(item => !sameCard(item, card));
      if (state.flagged.length === before) {
        setStatus('這張卡目前不在不熟字卡清單。');
        return;
      }
      saveFlaggedToLocal();
      renderStats();
      setStatus('已將目前字卡從不熟字卡清單移除。');
    }

    function studyFlaggedCards() {
      if (!state.flagged.length) {
        setStatus('目前還沒有收藏任何不熟字卡。', false);
        return;
      }
      state.filtered = [...state.flagged];
      rebuildReviewQueueFromFiltered();
      renderAll();
      setStatus('已切換到不熟字卡複習模式。');
    }

    function applySearch() {
      const keyword = els.searchInput.value.trim().toLowerCase();
      let pool = [...state.cards];
      if (!keyword) state.filtered = pool;
      else state.filtered = pool.filter(card => `${card.front}
${card.back}`.toLowerCase().includes(keyword));
      rebuildReviewQueueFromFiltered();
      renderAll();
    }

    function importCards(cards, deckName) {
      state.deckName = deckName || '未命名';
      state.cards = cards.map(card => ({ ...card, level: card.level || '未分類' }));
      state.filtered = [...state.cards];
      rebuildReviewQueueFromFiltered();
      renderAll();
      setStatus('已成功匯入 ' + cards.length + ' 張卡片。');
    }

    

    

    els.importBtn.addEventListener('click', function() {
      try {
        const cards = parseInput(els.inputArea.value, els.formatSelect.value);
        if (!cards.length) {
          setStatus('沒有解析到任何卡片，請檢查格式。', false);
          return;
        }
        importCards(cards, els.deckName.value.trim() || '未命名');
      } catch (err) {
        console.error(err);
        setStatus('匯入失敗：' + err.message, false);
      }
    });

    els.saveBtn.addEventListener('click', function() {
      saveCardsToLocal();
      saveFlaggedToLocal();
      setStatus('已儲存卡片與不熟字卡到瀏覽器。');
    });
    els.clearBtn.addEventListener('click', function() {
      state.deckName = '未命名';
      state.cards = [];
      state.filtered = [];
      state.reviewQueue = [];
      state.flagged = [];
      state.initialReviewCount = 0;
      state.stats = { again: 0, hard: 0, good: 0, easy: 0 };
      state.flipped = false;
      localStorage.removeItem(STORAGE_KEY);
      localStorage.removeItem(FLAGGED_STORAGE_KEY);
      els.inputArea.value = '';
      els.searchInput.value = '';
      renderAll();
      setStatus('已清空目前頁面資料。');
    });

    els.searchInput.addEventListener('input', applySearch);
    els.prevBtn.addEventListener('click', function() {
      if (!state.reviewQueue.length) return;
      const last = state.reviewQueue.pop();
      state.reviewQueue.unshift(last);
      state.flipped = false;
      renderAll();
    });
    els.nextBtn.addEventListener('click', function() {
      if (!state.reviewQueue.length) return;
      const first = state.reviewQueue.shift();
      state.reviewQueue.push(first);
      state.flipped = false;
      renderAll();
    });
    els.flipBtn.addEventListener('click', function() {
      if (!state.reviewQueue.length) return;
      state.flipped = !state.flipped;
      renderCard();
    });
    els.shuffleBtn.addEventListener('click', function() {
      for (let i = state.reviewQueue.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [state.reviewQueue[i], state.reviewQueue[j]] = [state.reviewQueue[j], state.reviewQueue[i]];
      }
      state.flipped = false;
      renderAll();
      setStatus('卡片順序已洗牌。');
    });
    els.restartBtn.addEventListener('click', restartReviewSession);
    els.restartSessionBtn.addEventListener('click', restartReviewSession);
    els.studyFlaggedBtn.addEventListener('click', studyFlaggedCards);
    els.againBtn.addEventListener('click', function() { handleReview('again'); });
    els.hardBtn.addEventListener('click', function() { handleReview('hard'); });
    els.goodBtn.addEventListener('click', function() { handleReview('good'); });
    els.easyBtn.addEventListener('click', function() { handleReview('easy'); });
    els.flagBtn.addEventListener('click', flagCurrentCard);
    els.unflagBtn.addEventListener('click', unflagCurrentCard);

    els.flashcard.addEventListener('click', function() {
      if (!state.reviewQueue.length) return;
      state.flipped = !state.flipped;
      renderCard();
    });

    els.fileInput.addEventListener('change', async function(event) {
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      try {
        const text = await file.text();
        const ext = (file.name.split('.').pop() || '').toLowerCase();
        if (ext === 'json') els.formatSelect.value = 'json';
        else if (ext === 'csv') els.formatSelect.value = 'csv';
        else els.formatSelect.value = 'tsv';
        els.inputArea.value = text;
        if (!els.deckName.value.trim()) {
          els.deckName.value = file.name.replace(/\.[^.]+$/, '');
        }
        setStatus('已讀取檔案：' + file.name + '，按「匯入卡片」即可。');
      } catch (err) {
        console.error(err);
        setStatus('讀取檔案失敗。', false);
      } finally {
        event.target.value = '';
      }
    });

    document.addEventListener('keydown', function(e) {
      const tag = e.target.tagName;
      if (tag === 'TEXTAREA' || tag === 'INPUT' || tag === 'SELECT') return;
      if (e.key === 'ArrowLeft') els.prevBtn.click();
      if (e.key === 'ArrowRight') els.nextBtn.click();
      if (e.key === ' ' || e.code === 'Space') {
        e.preventDefault();
        els.flipBtn.click();
      }
      if (e.key === '1') els.againBtn.click();
      if (e.key === '2') els.hardBtn.click();
      if (e.key === '3') els.goodBtn.click();
      if (e.key === '4') els.easyBtn.click();
      if (e.key === '5') els.flagBtn.click();
    });

    if ('speechSynthesis' in window) {
      loadVoices();
      window.speechSynthesis.onvoiceschanged = function() { loadVoices(); };
      window.addEventListener('click', unlockSpeech, { once: true });
    }

    renderAll();
    loadFlaggedFromLocal();
    loadCardsFromLocal();
  </script>
</body>
</html>
